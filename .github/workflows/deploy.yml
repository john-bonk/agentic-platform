name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Vite production build
        run: npx vite build
        env:
          NODE_ENV: production

      - name: Copy 404.html into dist
        # GH Pages serves 404.html for any unknown path; vite already copies
        # files from public/ into dist/public/, so this is a no-op safety net.
        run: |
          if [ -f public/404.html ] && [ ! -f dist/public/404.html ]; then
            cp public/404.html dist/public/404.html
          fi

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
